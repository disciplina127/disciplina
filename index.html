<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <meta name="theme-color" content="#0a0c12">
    <title>Дисциплина | Социальная сеть</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #0a0c12;
            --bg-secondary: #141820;
            --bg-card: #1a1f2b;
            --bg-input: #0f131c;
            --text-primary: #e8edf5;
            --text-secondary: #8a91a8;
            --accent: #ff5722;
            --accent-hover: #ff7043;
            --border: #252c38;
            --like: #ff3b5c;
            --comment-bg: #0d1119;
            --success: #4caf50;
        }

        body.light-theme {
            --bg-primary: #f5f7fb;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-input: #f0f2f6;
            --text-primary: #1a1f2e;
            --text-secondary: #5a6278;
            --accent: #ff5722;
            --border: #e2e6ed;
        }

        body { background: var(--bg-primary); }

        .auth-screen {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a0c12 0%, #141820 100%);
            padding: 16px;
        }

        .auth-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 24px;
            width: 100%;
            max-width: 380px;
            border: 1px solid var(--border);
        }

        .auth-card h1 {
            text-align: center;
            background: linear-gradient(135deg, #ff5722, #ff8a4c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 34px;
            margin-bottom: 8px;
        }

        input, textarea {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: 16px;
            background: var(--bg-input);
            color: var(--text-primary);
        }

        textarea { resize: none; font-family: inherit; }

        button {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .switch-btn {
            text-align: center;
            margin-top: 16px;
            color: var(--accent);
            cursor: pointer;
            padding: 8px;
        }

        .error { color: var(--accent); font-size: 13px; margin-top: 10px; text-align: center; }

        .main-app {
            display: none;
            max-width: 600px;
            margin: 0 auto;
            background: var(--bg-primary);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .header {
            background: var(--bg-secondary);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff5722, #ff8a4c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logout-btn {
            background: var(--accent);
            width: auto;
            padding: 8px 16px;
            border-radius: 30px;
        }

        .tabs {
            display: flex;
            background: var(--bg-secondary);
            gap: 4px;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-secondary);
            border-radius: 30px;
        }

        .tab.active { background: var(--accent); color: white; }

        .content { padding: 12px; }
        .hidden { display: none; }

        .post {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .post-author {
            font-weight: 700;
            font-size: 15px;
            color: var(--accent);
            cursor: pointer;
            background: none;
            border: none;
            padding: 5px 0;
        }

        .post-menu { position: relative; }
        .menu-dots {
            background: none;
            width: auto;
            padding: 8px 12px;
            font-size: 20px;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 30px;
            border: none;
        }
        .menu-dots:active { background: var(--bg-input); }

        .menu-dropdown {
            position: absolute;
            right: 0;
            top: 40px;
            background: var(--bg-card);
            border-radius: 14px;
            padding: 8px 0;
            min-width: 140px;
            z-index: 999;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border: 1px solid var(--border);
        }
        .menu-dropdown button {
            background: none;
            width: 100%;
            text-align: left;
            padding: 12px 16px;
            border-radius: 0;
            color: var(--text-primary);
            font-size: 14px;
        }
        .menu-dropdown button:active { background: var(--accent); color: white; }

        .post-text { margin: 8px 0; color: var(--text-primary); line-height: 1.45; font-size: 15px; }
        .post-photo { max-width: 100%; border-radius: 16px; margin: 8px 0; max-height: 300px; object-fit: cover; cursor: pointer; }

        .post-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
        }

        .post-actions { display: flex; gap: 16px; }
        .like-btn, .comment-toggle-btn {
            cursor: pointer;
            background: none;
            border: none;
            padding: 8px 12px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .like-btn.liked { color: var(--like); }
        .post-time-footer { font-size: 11px; color: var(--text-secondary); }

        /* КОММЕНТАРИИ - ПОЛНОСТЬЮ ПЕРЕПИСАНЫ */
        .comments-wrapper { margin-top: 12px; }
        .comments-list { margin-bottom: 10px; }
        .comment {
            background: var(--comment-bg);
            border-radius: 16px;
            padding: 10px 14px;
            margin-bottom: 8px;
        }
        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .comment-author {
            font-weight: 600;
            font-size: 13px;
            color: var(--accent);
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
        }
        .comment-date { font-size: 10px; color: var(--text-secondary); }
        .comment-text { color: var(--text-primary); font-size: 13px; margin: 4px 0; line-height: 1.4; }

        .comment-form {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .comment-form input {
            flex: 1;
            padding: 12px;
            border-radius: 30px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 14px;
        }
        .comment-form button {
            width: auto;
            padding: 8px 20px;
            border-radius: 30px;
            margin: 0;
        }
        .no-comments {
            text-align: center;
            color: var(--text-secondary);
            padding: 12px;
            font-size: 13px;
        }

        .profile-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }
        .avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin: 0 auto 12px; background: var(--border); border: 2px solid var(--accent); cursor: pointer; }
        .stats { display: flex; justify-content: center; gap: 24px; margin: 16px 0; }
        .stat-value { font-size: 18px; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 11px; color: var(--text-secondary); }
        .profile-buttons { display: flex; gap: 10px; justify-content: center; margin-top: 12px; flex-wrap: wrap; }

        .upload-btn { position: relative; margin: 8px 0; }
        .upload-btn input[type="file"] { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; z-index: 2; }
        .upload-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border-radius: 14px;
            padding: 14px;
            cursor: pointer;
            color: white;
            font-size: 14px;
            font-weight: 600;
        }
        .file-name { font-size: 12px; color: var(--accent); margin-top: 8px; display: block; text-align: center; }

        .edit-form { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); text-align: left; }
        .profile-posts-title { font-size: 15px; font-weight: 600; margin: 16px 0 12px 0; color: var(--text-primary); }
        .back-btn { background: var(--bg-input); width: auto; padding: 8px 16px; border-radius: 30px; color: var(--text-primary); }

        .fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: white;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 200;
            border: none;
        }
        .fab:active { transform: scale(0.95); }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 300;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-content {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border);
        }
        .modal-content h3 { margin-bottom: 16px; color: var(--text-primary); font-size: 20px; text-align: center; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 12px; }
        .modal-buttons button { flex: 1; }
        .cancel-modal { background: var(--bg-input); color: var(--text-primary); }

        .game-card { background: var(--bg-card); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); }
        .game-header { text-align: center; margin-bottom: 20px; }
        .game-icon { font-size: 48px; margin-bottom: 10px; }
        .game-title { font-size: 22px; font-weight: bold; color: var(--accent); }
        .dice-container { background: linear-gradient(135deg, var(--bg-input), var(--bg-card)); border-radius: 20px; padding: 30px; text-align: center; margin: 20px 0; border: 1px solid var(--border); }
        .dice-value { font-size: 70px; font-weight: bold; margin: 20px 0; }
        .dice-value.positive { color: var(--success); }
        .dice-value.negative { color: #f44336; }
        .roll-button { font-size: 18px; padding: 14px; border-radius: 50px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .stat-card { background: var(--bg-input); border-radius: 16px; padding: 15px; text-align: center; border: 1px solid var(--border); }

        .leaderboard { background: var(--bg-card); border-radius: 20px; padding: 16px; border: 1px solid var(--border); }
        .leaderboard-header { display: flex; justify-content: space-between; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
        .leaderboard-title { font-size: 18px; font-weight: bold; color: var(--text-primary); }
        .leaderboard-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 12px; margin-bottom: 6px; cursor: pointer; }
        .leaderboard-rank { font-weight: bold; min-width: 35px; color: var(--accent); }
        .rank-1 { color: #ffd700; }
        .rank-2 { color: #c0c0c0; }
        .rank-3 { color: #cd7f32; }
        .leaderboard-name { flex: 1; font-weight: 600; color: var(--text-primary); }
        .leaderboard-score { color: var(--accent); font-weight: bold; }

        @media (max-width: 500px) {
            .content { padding: 8px; }
            .fab { width: 55px; height: 55px; font-size: 28px; }
            .post-actions { gap: 8px; }
            .like-btn, .comment-toggle-btn { padding: 6px 10px; }
            .comment-form button { padding: 8px 14px; }
        }
    </style>
</head>
<body>

<div id="authScreen" class="auth-screen">
    <div class="auth-card">
        <h1>Дисциплина</h1>
        <div class="sub" style="text-align:center;color:var(--text-secondary);margin-bottom:20px;">Делай каждый день</div>
        <div id="authForm">
            <input type="text" id="regName" placeholder="Имя">
            <input type="email" id="regEmail" placeholder="Email">
            <input type="password" id="regPassword" placeholder="Пароль">
            <button id="submitAuthBtn">Зарегистрироваться</button>
            <div class="switch-btn" id="switchModeBtn">Уже есть аккаунт? Войти</div>
        </div>
        <div id="authError" class="error"></div>
    </div>
</div>

<div id="mainApp" class="main-app">
    <div class="header">
        <div class="logo" id="logoBtn">Дисциплина</div>
        <div class="header-actions">
            <button class="back-btn hidden" id="backBtn">← Назад</button>
            <button class="logout-btn" id="logoutBtn">Выйти</button>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" data-tab="feed">Лента</div>
        <div class="tab" data-tab="game">Игра</div>
        <div class="tab" data-tab="profile">Профиль</div>
    </div>

    <div class="content">
        <div id="feedTab"><div id="postsList"></div></div>
        <div id="gameTab" class="hidden"><div id="gameContainer"></div></div>
        <div id="profileTab" class="hidden"><div id="profileContainer"></div></div>
    </div>

    <button class="fab" id="fabBtn">+</button>

    <div id="postModal" class="modal">
        <div class="modal-content">
            <h3>Новый пост</h3>
            <textarea id="modalPostText" rows="3" placeholder="Что у тебя нового?"></textarea>
            <div class="upload-btn">
                <input type="file" id="modalPostPhoto" accept="image/*">
                <div class="upload-label"><span>📷</span><span>Выбрать фото</span></div>
                <span id="fileNameDisplay" class="file-name"></span>
            </div>
            <div class="modal-buttons">
                <button id="modalPublishBtn">Опубликовать</button>
                <button id="modalCancelBtn" class="cancel-modal">Отмена</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== FIREBASE ==========
    const firebaseConfig = {
        apiKey: "AIzaSyAWk8l7q04m2keV5DoaMA4kIymf0ac9lQQ",
        authDomain: "disciplina-8ac49.firebaseapp.com",
        projectId: "disciplina-8ac49",
        storageBucket: "disciplina-8ac49.firebasestorage.app",
        messagingSenderId: "826961979878",
        appId: "1:826961979878:web:3d3b62f747253e4fcd8e27"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let posts = [];
    let users = [];
    let gameStats = [];
    let openComments = {};
    let openMenus = {};
    let viewingUserId = null;
    let isLoginMode = false;

    function formatDate(date) {
        if (!date) return 'только что';
        const d = date.toDate ? date.toDate() : new Date(date);
        const now = new Date();
        const diff = Math.floor((now - d) / 1000);
        if (diff < 60) return 'только что';
        if (diff < 3600) return Math.floor(diff / 60) + ' мин';
        if (diff < 86400) return Math.floor(diff / 3600) + ' ч';
        return d.toLocaleDateString('ru-RU', {day:'numeric', month:'short'});
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, (m) => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    // ========== СЖАТИЕ ФОТО (5 МБ ДОПУСКАЕТСЯ) ==========
    function compressImage(file, maxWidth = 900) {
        return new Promise((resolve, reject) => {
            if (!file.type.match(/image.*/)) {
                resolve(null);
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > maxWidth) {
                        height = (height * maxWidth) / width;
                        width = maxWidth;
                    }
                    
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    let quality = 0.8;
                    let result = canvas.toDataURL('image/jpeg', quality);
                    
                    while (result.length > 3.5 * 1024 * 1024 && quality > 0.5) {
                        quality -= 0.1;
                        result = canvas.toDataURL('image/jpeg', quality);
                    }
                    
                    resolve(result);
                };
                img.onerror = reject;
                img.src = e.target.result;
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    async function loadData() {
        const usersSnapshot = await db.collection('users').get();
        users = usersSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        const postsSnapshot = await db.collection('posts').orderBy('date', 'desc').get();
        posts = postsSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        const statsSnapshot = await db.collection('gameStats').get();
        gameStats = statsSnapshot.docs.map(doc => ({ userId: doc.id, ...doc.data() }));
    }

    // ========== ПОСТЫ ==========
    async function savePost(text, photoDataUrl) {
        await db.collection('posts').add({
            userId: currentUser.uid,
            text: text,
            photo: photoDataUrl || null,
            likes: [],
            comments: [],
            date: firebase.firestore.FieldValue.serverTimestamp()
        });
        await loadData();
        renderFeed();
    }

    async function toggleLike(postId, post) {
        const likes = post.likes || [];
        const index = likes.indexOf(currentUser.uid);
        if (index === -1) likes.push(currentUser.uid);
        else likes.splice(index, 1);
        await db.collection('posts').doc(postId).update({ likes });
        await loadData();
        renderFeed();
    }

    // ========== КОММЕНТАРИИ - ПОЛНОСТЬЮ ПЕРЕПИСАНЫ ==========
    async function addComment(postId, commentText) {
        if (!commentText || !commentText.trim()) return;
        
        const post = posts.find(p => p.id === postId);
        if (!post) return;
        
        const comments = post.comments || [];
        comments.push({
            userId: currentUser.uid,
            text: commentText.trim(),
            date: new Date().toISOString()
        });
        
        await db.collection('posts').doc(postId).update({ comments });
        await loadData();
        
        // Автоматически открываем комментарии после добавления
        openComments[postId] = true;
        renderFeed();
    }
    
    async function deleteComment(postId, commentIndex) {
        if (!confirm('Удалить комментарий?')) return;
        
        const post = posts.find(p => p.id === postId);
        if (!post || !post.comments) return;
        
        post.comments.splice(commentIndex, 1);
        await db.collection('posts').doc(postId).update({ comments: post.comments });
        await loadData();
        renderFeed();
    }
    
    async function editComment(postId, commentIndex, newText) {
        if (!newText || !newText.trim()) return;
        
        const post = posts.find(p => p.id === postId);
        if (!post || !post.comments || !post.comments[commentIndex]) return;
        
        post.comments[commentIndex].text = newText.trim();
        await db.collection('posts').doc(postId).update({ comments: post.comments });
        await loadData();
        renderFeed();
    }

    async function deletePost(postId) {
        if (confirm('Удалить пост?')) {
            await db.collection('posts').doc(postId).delete();
            await loadData();
            renderFeed();
        }
    }

    async function editPost(postId) {
        const post = posts.find(p => p.id === postId);
        const newText = prompt('Редактировать пост:', post?.text);
        if (newText && newText.trim()) {
            await db.collection('posts').doc(postId).update({ text: newText.trim() });
            await loadData();
            renderFeed();
        }
    }

    async function updateUserProfile(userId, data) {
        await db.collection('users').doc(userId).update(data);
        await loadData();
        renderProfile();
        renderFeed();
    }

    // ========== ИГРА ==========
    function rollNumber() { return Math.floor(Math.random() * 16) - 5; }

    async function playGame() {
        const stats = gameStats.find(s => s.userId === currentUser.uid);
        const lastDate = stats?.lastAttemptDate?.toDate ? stats.lastAttemptDate.toDate() : null;
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        
        if (lastDate && lastDate >= today) {
            alert('Вы уже играли сегодня! Завтра новая попытка.');
            return;
        }
        
        const rolled = rollNumber();
        const newTotal = (stats?.totalPoints || 0) + rolled;
        const newBest = Math.max(rolled, stats?.bestRoll || -5);
        
        await db.collection('gameStats').doc(currentUser.uid).set({
            userId: currentUser.uid,
            totalPoints: newTotal,
            bestRoll: newBest,
            lastAttemptDate: firebase.firestore.FieldValue.serverTimestamp(),
            lastRollValue: rolled
        });
        
        await loadData();
        renderGameTab();
        alert(rolled >= 0 ? `🎉 +${rolled} очков!\nВсего: ${newTotal}` : `😢 ${rolled} очков.\nВсего: ${newTotal}`);
    }

    // ========== РЕНДЕР ЛЕНТЫ ==========
    async function renderFeed() {
        const container = document.getElementById('postsList');
        if (!posts.length) {
            container.innerHTML = '<div style="text-align:center;color:var(--text-secondary);padding:40px;">📭 Нет постов. Нажми +</div>';
            return;
        }
        
        container.innerHTML = posts.map(post => {
            const author = users.find(u => u.id === post.userId);
            const isLiked = post.likes?.includes(currentUser.uid);
            const isAuthor = post.userId === currentUser.uid;
            const showComments = openComments[post.id] || false;
            const showMenu = openMenus[post.id];
            const comments = post.comments || [];
            
            return `
                <div class="post" data-post-id="${post.id}">
                    <div class="post-header">
                        <button class="post-author" onclick="viewProfile('${post.userId}')">${escapeHtml(author?.name || '?')}</button>
                        ${isAuthor ? `
                            <div class="post-menu">
                                <button class="menu-dots" onclick="event.stopPropagation(); toggleMenu('${post.id}')">⋮</button>
                                ${showMenu ? `
                                    <div class="menu-dropdown">
                                        <button onclick="editPost('${post.id}')">✏️ Редактировать</button>
                                        <button onclick="deletePost('${post.id}')">🗑️ Удалить</button>
                                    </div>
                                ` : ''}
                            </div>
                        ` : ''}
                    </div>
                    <div class="post-text">${escapeHtml(post.text)}</div>
                    ${post.photo ? `<img src="${post.photo}" class="post-photo" onclick="window.open(this.src)">` : ''}
                    <div class="post-footer">
                        <div class="post-actions">
                            <button class="like-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike('${post.id}', ${JSON.stringify(post).replace(/"/g, '&quot;')})">❤️ ${post.likes?.length || 0}</button>
                            <button class="comment-toggle-btn" onclick="toggleCommentsSection('${post.id}')">💬 ${comments.length}</button>
                        </div>
                        <div class="post-time-footer">${formatDate(post.date)}</div>
                    </div>
                    ${showComments ? renderCommentsSection(post.id, comments) : ''}
                </div>
            `;
        }).join('');
    }
    
    function renderCommentsSection(postId, comments) {
        if (!comments || comments.length === 0) {
            return `
                <div class="comments-wrapper">
                    <div class="comments-list">
                        <div class="no-comments">✨ Нет комментариев. Будь первым!</div>
                    </div>
                    <div class="comment-form">
                        <input type="text" id="commentInput-${postId}" placeholder="Написать комментарий..." maxlength="500">
                        <button onclick="submitComment('${postId}')">→</button>
                    </div>
                </div>
            `;
        }
        
        return `
            <div class="comments-wrapper">
                <div class="comments-list">
                    ${comments.map((comment, idx) => {
                        const commentAuthor = users.find(u => u.id === comment.userId);
                        const isCommentAuthor = comment.userId === currentUser.uid;
                        return `
                            <div class="comment" id="comment-${postId}-${idx}">
                                <div class="comment-header">
                                    <button class="comment-author" onclick="viewProfile('${comment.userId}')">${escapeHtml(commentAuthor?.name || '?')}</button>
                                    <span class="comment-date">${formatDate(comment.date)}</span>
                                </div>
                                <div class="comment-text" id="commentText-${postId}-${idx}">${escapeHtml(comment.text)}</div>
                                ${isCommentAuthor ? `
                                    <div style="display: flex; gap: 12px; margin-top: 6px;">
                                        <button onclick="editCommentUI('${postId}', ${idx})" style="background:none; border:none; color:var(--text-secondary); font-size:11px; cursor:pointer;">✏️ Ред.</button>
                                        <button onclick="deleteComment('${postId}', ${idx})" style="background:none; border:none; color:var(--text-secondary); font-size:11px; cursor:pointer;">🗑️ Удалить</button>
                                    </div>
                                    <div id="editCommentForm-${postId}-${idx}" style="display:none; margin-top:8px;">
                                        <input type="text" id="editCommentInput-${postId}-${idx}" value="${escapeHtml(comment.text)}" style="width:100%; padding:8px; border-radius:20px; background:var(--bg-input); border:1px solid var(--border); color:var(--text-primary);">
                                        <div style="display:flex; gap:8px; margin-top:6px;">
                                            <button onclick="saveCommentEdit('${postId}', ${idx})" style="width:auto; padding:6px 12px; font-size:12px;">Сохранить</button>
                                            <button onclick="cancelCommentEdit('${postId}', ${idx})" style="width:auto; padding:6px 12px; font-size:12px;">Отмена</button>
                                        </div>
                                    </div>
                                ` : ''}
                            </div>
                        `;
                    }).join('')}
                </div>
                <div class="comment-form">
                    <input type="text" id="commentInput-${postId}" placeholder="Написать комментарий..." maxlength="500">
                    <button onclick="submitComment('${postId}')">→</button>
                </div>
            </div>
        `;
    }
    
    function toggleCommentsSection(postId) {
        openComments[postId] = !openComments[postId];
        renderFeed();
    }
    
    window.submitComment = async function(postId) {
        const input = document.getElementById(`commentInput-${postId}`);
        const text = input?.value;
        if (!text || !text.trim()) {
            alert('Напишите комментарий');
            return;
        }
        await addComment(postId, text);
        input.value = '';
    };
    
    window.editCommentUI = function(postId, idx) {
        const form = document.getElementById(`editCommentForm-${postId}-${idx}`);
        const textSpan = document.getElementById(`commentText-${postId}-${idx}`);
        if (form) form.style.display = 'block';
        if (textSpan) textSpan.style.display = 'none';
    };
    
    window.saveCommentEdit = async function(postId, idx) {
        const input = document.getElementById(`editCommentInput-${postId}-${idx}`);
        const newText = input?.value;
        if (!newText || !newText.trim()) return;
        await editComment(postId, idx, newText);
    };
    
    window.cancelCommentEdit = function(postId, idx) {
        const form = document.getElementById(`editCommentForm-${postId}-${idx}`);
        const textSpan = document.getElementById(`commentText-${postId}-${idx}`);
        if (form) form.style.display = 'none';
        if (textSpan) textSpan.style.display = 'block';
    };
    
    window.deleteComment = deleteComment;
    
    // ========== ПРОФИЛЬ ==========
    async function renderProfile() {
        const container = document.getElementById('profileContainer');
        const profileUser = users.find(u => u.id === viewingUserId);
        if (!profileUser) return;
        
        const isOwn = viewingUserId === currentUser.uid;
        document.getElementById('backBtn').classList.toggle('hidden', isOwn);
        
        const userPosts = posts.filter(p => p.userId === viewingUserId);
        const userStats = gameStats.find(s => s.userId === viewingUserId) || { totalPoints: 0, bestRoll: -5 };
        
        container.innerHTML = `
            <div class="profile-card">
                <img class="avatar" src="${profileUser.avatar || 'https://via.placeholder.com/80?text=?'}" id="profileAvatar">
                <h3 style="color:var(--text-primary);">${escapeHtml(profileUser.name)}</h3>
                <p style="color:var(--text-secondary); font-size:13px; margin-top:6px;">${escapeHtml(profileUser.bio || 'Нет описания')}</p>
                <div class="stats">
                    <div><div class="stat-value">${userPosts.length}</div><div class="stat-label">посты</div></div>
                    <div><div class="stat-value">${profileUser.followers?.length || 0}</div><div class="stat-label">подписчики</div></div>
                    <div><div class="stat-value">${profileUser.following?.length || 0}</div><div class="stat-label">подписки</div></div>
                </div>
                <div class="stats">
                    <div><div class="stat-value" style="color:var(--success);">${userStats.totalPoints}</div><div class="stat-label">очков</div></div>
                    <div><div class="stat-value" style="color:#ff9800;">${userStats.bestRoll >= 0 ? '+' : ''}${userStats.bestRoll}</div><div class="stat-label">лучший бросок</div></div>
                </div>
                <div class="profile-buttons">
                    ${!isOwn ? `<button class="follow-btn" style="background:var(--bg-input);color:var(--accent);border:1px solid var(--accent);" onclick="alert('Подписки в разработке')">Подписаться</button>` : `
                        <button id="editProfileBtn">✏️ Редактировать</button>
                        <button id="themeBtn">🌓 Тема</button>
                    `}
                </div>
                ${isOwn ? `
                    <div id="editProfileForm" class="edit-form hidden">
                        <input type="text" id="editName" placeholder="Имя" value="${escapeHtml(profileUser.name)}">
                        <textarea id="editBio" rows="2" placeholder="О себе">${escapeHtml(profileUser.bio || '')}</textarea>
                        <div class="upload-btn">
                            <input type="file" id="editAvatar" accept="image/*">
                            <div class="upload-label"><span>📷</span><span>Выбрать аватар</span></div>
                            <span id="avatarFileNameDisplay" class="file-name"></span>
                        </div>
                        <button id="saveProfileBtn">Сохранить</button>
                        <button id="cancelEditBtn">Отмена</button>
                    </div>
                ` : ''}
            </div>
            <div class="profile-posts-title">📝 Посты</div>
            <div id="profilePosts"></div>
        `;
        
        const profilePosts = document.getElementById('profilePosts');
        if (!userPosts.length) profilePosts.innerHTML = '<div style="text-align:center;color:var(--text-secondary);padding:30px;">Нет постов</div>';
        else {
            profilePosts.innerHTML = userPosts.map(post => `
                <div class="post">
                    <div class="post-text">${escapeHtml(post.text)}</div>
                    ${post.photo ? `<img src="${post.photo}" class="post-photo">` : ''}
                    <div class="post-footer"><div class="post-time-footer">${formatDate(post.date)}</div></div>
                </div>
            `).join('');
        }
        
        if (isOwn) {
            document.getElementById('editProfileBtn')?.addEventListener('click', () => {
                document.getElementById('editProfileForm').classList.remove('hidden');
            });
            document.getElementById('saveProfileBtn')?.addEventListener('click', async () => {
                const newName = document.getElementById('editName').value.trim();
                if (newName && newName !== currentUser.name) {
                    if (users.find(u => u.name === newName && u.id !== currentUser.uid)) {
                        alert('Имя уже занято');
                        return;
                    }
                    await updateUserProfile(currentUser.uid, { name: newName });
                }
                const newBio = document.getElementById('editBio').value.trim();
                await updateUserProfile(currentUser.uid, { bio: newBio });
                
                const avatarFile = document.getElementById('editAvatar').files[0];
                if (avatarFile) {
                    const compressed = await compressImage(avatarFile, 400);
                    if (compressed) await updateUserProfile(currentUser.uid, { avatar: compressed });
                }
                
                document.getElementById('editProfileForm').classList.add('hidden');
                alert('Профиль обновлён!');
            });
            document.getElementById('cancelEditBtn')?.addEventListener('click', () => {
                document.getElementById('editProfileForm').classList.add('hidden');
            });
            document.getElementById('themeBtn')?.addEventListener('click', toggleTheme);
            
            document.getElementById('editAvatar')?.addEventListener('change', function(e) {
                const fileName = e.target.files[0]?.name || '';
                const display = document.getElementById('avatarFileNameDisplay');
                if (display) display.textContent = fileName ? `📎 ${fileName.substring(0, 30)}${fileName.length > 30 ? '...' : ''}` : '';
            });
        }
    }

    // ========== ИГРА (рендер) ==========
    async function renderGameTab() {
        const container = document.getElementById('gameContainer');
        const stats = gameStats.find(s => s.userId === currentUser.uid);
        const lastDate = stats?.lastAttemptDate?.toDate ? stats.lastAttemptDate.toDate() : null;
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const canPlay = !lastDate || lastDate < today;
        
        container.innerHTML = `
            <div class="game-card">
                <div class="game-header">
                    <div class="game-icon">🎲</div>
                    <div class="game-title">Пиписа бот</div>
                    <div style="color:var(--text-secondary);font-size:13px;margin-top:8px;">Бросай кубик каждый день! от -5 до +10</div>
                </div>
                <div class="dice-container">
                    <div class="dice-value ${stats?.lastRollValue >= 0 ? 'positive' : 'negative'}">
                        ${stats?.lastRollValue !== undefined && !canPlay ? `${stats.lastRollValue >= 0 ? '+' : ''}${stats.lastRollValue}` : '🎲'}
                    </div>
                </div>
                <button id="rollButton" class="roll-button" ${!canPlay ? 'disabled' : ''}>
                    ${canPlay ? '🎲 Бросить кубик!' : '⏰ Доступно завтра'}
                </button>
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-label">Всего очков</div><div class="stat-value">${stats?.totalPoints || 0}</div></div>
                    <div class="stat-card"><div class="stat-label">Лучший бросок</div><div class="stat-value">${stats?.bestRoll >= 0 ? '+' : ''}${stats?.bestRoll || -5}</div></div>
                </div>
            </div>
            <div id="leaderboardContainer"></div>
        `;
        
        document.getElementById('rollButton')?.addEventListener('click', playGame);
        await renderLeaderboard();
    }

    async function renderLeaderboard() {
        const container = document.getElementById('leaderboardContainer');
        if (!container) return;
        
        const data = [...gameStats].sort((a,b) => b.totalPoints - a.totalPoints).slice(0,20);
        if (!data.length) {
            container.innerHTML = `<div class="leaderboard"><div class="leaderboard-header"><div class="leaderboard-title">🏆 Лидерборд</div></div><div style="text-align:center;padding:40px;color:var(--text-secondary);">Пока нет участников</div></div>`;
            return;
        }
        
        const usersMap = new Map(users.map(u => [u.id, u]));
        container.innerHTML = `
            <div class="leaderboard">
                <div class="leaderboard-header"><div class="leaderboard-title">🏆 Лидерборд</div></div>
                ${data.map((item, idx) => {
                    const user = usersMap.get(item.userId);
                    return `
                        <div class="leaderboard-item" onclick="viewProfile('${item.userId}')">
                            <div class="leaderboard-rank ${idx===0?'rank-1':idx===1?'rank-2':idx===2?'rank-3':''}">${idx+1}</div>
                            <div class="leaderboard-name">${escapeHtml(user?.name || '?')}</div>
                            <div class="leaderboard-score">${item.totalPoints}</div>
                        </div>
                    `;
                }).join('')}
            </div>
        `;
    }

    // ========== АВТОРИЗАЦИЯ ==========
    const authScreen = document.getElementById('authScreen');
    const mainApp = document.getElementById('mainApp');
    const submitBtn = document.getElementById('submitAuthBtn');
    const switchBtn = document.getElementById('switchModeBtn');
    const authError = document.getElementById('authError');

    function updateAuthButton() {
        if (isLoginMode) {
            submitBtn.textContent = 'Войти';
            switchBtn.textContent = 'Нет аккаунта? Зарегистрироваться';
            document.getElementById('regName').style.display = 'none';
        } else {
            submitBtn.textContent = 'Зарегистрироваться';
            switchBtn.textContent = 'Уже есть аккаунт? Войти';
            document.getElementById('regName').style.display = 'block';
        }
    }

    switchBtn.onclick = () => {
        isLoginMode = !isLoginMode;
        updateAuthButton();
        authError.textContent = '';
    };

    submitBtn.onclick = async () => {
        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        
        if (!email || !password) { authError.textContent = 'Заполните email и пароль'; return; }
        
        try {
            if (!isLoginMode) {
                if (!name) { authError.textContent = 'Введите имя'; return; }
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                await db.collection('users').doc(userCredential.user.uid).set({
                    name, email, bio: '', avatar: null, followers: [], following: []
                });
                await db.collection('gameStats').doc(userCredential.user.uid).set({
                    userId: userCredential.user.uid, totalPoints: 0, bestRoll: -5, lastAttemptDate: null, lastRollValue: null
                });
                currentUser = userCredential.user;
                await loadData();
                showMainApp();
            } else {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                currentUser = userCredential.user;
                await loadData();
                showMainApp();
            }
        } catch (error) { authError.textContent = error.message; }
    };

    async function showMainApp() {
        viewingUserId = currentUser.uid;
        authScreen.style.display = 'none';
        mainApp.style.display = 'block';
        await renderFeed();
        await renderProfile();
        renderGameTab();
    }

    document.getElementById('logoutBtn').onclick = async () => {
        await auth.signOut();
        currentUser = null;
        authScreen.style.display = 'flex';
        mainApp.style.display = 'none';
        isLoginMode = false;
        updateAuthButton();
    };

    document.getElementById('logoBtn').onclick = () => {
        viewingUserId = currentUser.uid;
        renderProfile();
        document.querySelector('.tab[data-tab="profile"]').click();
    };

    document.getElementById('backBtn').onclick = () => {
        viewingUserId = currentUser.uid;
        renderProfile();
    };

    // ========== МЕНЮ ТОЧЕК ==========
    window.toggleMenu = function(postId) {
        if (openMenus[postId]) delete openMenus[postId];
        else { openMenus = {}; openMenus[postId] = true; }
        renderFeed();
    };

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.post-menu')) {
            openMenus = {};
            renderFeed();
        }
    });

    // ========== ГЛОБАЛЬНЫЕ ФУНКЦИИ ==========
    window.viewProfile = (userId) => {
        viewingUserId = userId;
        renderProfile();
        document.querySelector('.tab[data-tab="profile"]').click();
    };
    window.toggleLike = toggleLike;
    window.deletePost = deletePost;
    window.editPost = editPost;
    window.toggleCommentsSection = toggleCommentsSection;

    // ========== СОЗДАНИЕ ПОСТА ==========
    const modal = document.getElementById('postModal');
    const fabBtn = document.getElementById('fabBtn');

    fabBtn.onclick = () => {
        modal.style.display = 'flex';
        document.getElementById('modalPostText').value = '';
        document.getElementById('modalPostPhoto').value = '';
        const display = document.getElementById('fileNameDisplay');
        if (display) display.textContent = '';
        document.getElementById('modalPostText').focus();
    };

    document.getElementById('modalCancelBtn').onclick = () => { modal.style.display = 'none'; };
    modal.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };

    document.getElementById('modalPublishBtn').onclick = async () => {
        const text = document.getElementById('modalPostText').value.trim();
        if (!text) { alert('Напишите текст'); return; }
        
        const file = document.getElementById('modalPostPhoto').files[0];
        
        if (file) {
            try {
                document.getElementById('modalPublishBtn').textContent = 'Загрузка...';
                document.getElementById('modalPublishBtn').disabled = true;
                
                if (file.size > 5 * 1024 * 1024) {
                    alert('Файл слишком большой! Максимум 5 МБ. Фото будет сжато.');
                }
                
                const compressedImage = await compressImage(file, 900);
                await savePost(text, compressedImage);
                modal.style.display = 'none';
            } catch (error) {
                alert('Ошибка при загрузке фото: ' + error.message);
            } finally {
                document.getElementById('modalPublishBtn').textContent = 'Опубликовать';
                document.getElementById('modalPublishBtn').disabled = false;
            }
        } else {
            await savePost(text, null);
            modal.style.display = 'none';
        }
    };

    document.getElementById('modalPostPhoto').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) updateFileName(this);
    });

    function updateFileName(input) {
        const fileName = input.files[0]?.name || '';
        const display = document.getElementById('fileNameDisplay');
        if (display) display.textContent = fileName ? `📎 ${fileName.substring(0, 40)}${fileName.length > 40 ? '...' : ''}` : '';
    }

    // ========== ТАБЫ ==========
    document.querySelectorAll('.tab').forEach(tab => {
        tab.onclick = () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            const tabName = tab.dataset.tab;
            if (tabName === 'feed') {
                document.getElementById('feedTab').classList.remove('hidden');
                document.getElementById('gameTab').classList.add('hidden');
                document.getElementById('profileTab').classList.add('hidden');
                renderFeed();
            } else if (tabName === 'game') {
                document.getElementById('feedTab').classList.add('hidden');
                document.getElementById('gameTab').classList.remove('hidden');
                document.getElementById('profileTab').classList.add('hidden');
                renderGameTab();
            } else {
                document.getElementById('feedTab').classList.add('hidden');
                document.getElementById('gameTab').classList.add('hidden');
                document.getElementById('profileTab').classList.remove('hidden');
                renderProfile();
            }
        };
    });

    function toggleTheme() {
        document.body.classList.toggle('light-theme');
        localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
    }

    function initTheme() {
        if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-theme');
    }

    initTheme();
    auth.onAuthStateChanged(async (user) => {
        if (user) { currentUser = user; await loadData(); showMainApp(); }
    });
</script>
</body>
</html>
